name: Run pytest tests

on:
  workflow_call:
    inputs:
      pipenv-install-options:
        description: 'Pipenv installation options'
        default: ""
        required: false
        type: string
      cache:
        description: "Cache python environment?"
        default: true
        required: false
        type: boolean
      pytest_opts:
        description: 'Additional pytest options'
        default: ''
        required: false
        type: string
      python-versions:
        description: 'Supported python versions'
        default: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
        required: false
        type: string
      allow-prereleases:
        description: "Allow falling back to pre-release versions of Python when a matching GA version of Python is not available."
        default: true
        type: boolean
      os:
        description: 'Operating system to run tests on'
        default: 'ubuntu-latest'
        required: false
        type: string
      fail_on_codecov_error:
        description: 'Whether pipeline should fail if there would be an error on codecov side.'
        default: false
        required: false
        type: boolean
      env:
        description: 'JSON object string of environment variables to set (only for pipenv path)'
        default: '{}'
        required: false
        type: string
      install_editable:
        description: 'Whether to install in pipenv editable mode'
        default: false
        required: false
        type: boolean
      dependency-manager:
        description: 'Dependency manager to use (pipenv, uv)'
        default: 'pipenv'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  pytests:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
      - uses: fizyk/actions-reuse/.github/actions/uv@v5.1.1
        if: ${{ inputs.dependency-manager == 'uv' }}
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ inputs.allow-prereleases }}
          cache: ${{ inputs.cache }}
          command: pytest -v --cov --cov-report=xml ${{ inputs.pytest_opts }}
          env: ${{ inputs.env }}
      - uses: fizyk/actions-reuse/.github/actions/pipenv@v5.1.1
        if: ${{ inputs.dependency-manager != 'uv' }}
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ inputs.allow-prereleases }}
          cache: ${{ inputs.cache }}
          pipenv-install-options: ${{ inputs.pipenv-install-options }}
          command: pytest -v --cov --cov-report=xml ${{ inputs.pytest_opts }}
          env: ${{ inputs.env }}
          editable: ${{ inputs.install_editable }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.codecov_token }}
          flags: unittests
          env_vars: OS,PYTHON
          fail_ci_if_error: ${{ inputs.fail_on_codecov_error }}
